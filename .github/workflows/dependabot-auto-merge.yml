name: Dependabot Auto-merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Request reviewers
        if: github.event.action == 'opened'
        run: gh pr edit "$PR_URL" --add-reviewer "Eddy-GetGo,heyhadi,DimzGetGo,jordanjxc"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply team PR template to Dependabot PR body
        if: github.event.action == 'opened'
        run: |
          original_body=$(gh pr view "$PR_URL" --json body --jq '.body')
          body_file="$(mktemp)"
          printf '%s' "$original_body" > "$body_file"
          printf '\n\n___\n\n## Type of change\n> Dependency update\n\n## Description\nDEPENDENCY_NAMES_PLACEHOLDER\n\nUpdate type: UPDATE_TYPE_PLACEHOLDER\n\n## Checklist\n- [x] I have fixed the static analysis issues.\n- [x] I have updated or implemented the unit tests.\n\n## Screenshots/GIFs (if applicable)\n> N/A - dependency-only update, no UI changes.\n' >> "$body_file"
          sed -i "s|DEPENDENCY_NAMES_PLACEHOLDER|Automated dependency update — bumps \`${{ steps.meta.outputs.dependency-names }}\` from \`${{ steps.meta.outputs.previous-version }}\` to \`${{ steps.meta.outputs.new-version }}\`.|" "$body_file"
          sed -i "s|UPDATE_TYPE_PLACEHOLDER|\`${{ steps.meta.outputs.update-type }}\`|" "$body_file"
          gh pr edit "$PR_URL" --body-file "$body_file"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch updates only
        # --auto registers merge intent; GitHub waits for ALL required branch
        # protection checks (build, Vitest, Sonar) to pass before merging.
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label minor version PRs for manual review
        if: steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr edit "$PR_URL" --add-label "minor-version"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label major version PRs for manual review
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: gh pr edit "$PR_URL" --add-label "major-version"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
